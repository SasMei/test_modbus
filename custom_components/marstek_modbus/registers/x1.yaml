# Venus A registers are untested.
# Base register map generated from CSV (v3 Description).
# Verify all addresses, names, and mappings on real hardware before use.
# Some entries may be incorrect, duplicated, or unmatched.
# See `# UNMATCHED_CSV_ENTRIES` at the end of this file.

MISSING:
    sensor:
        - sn_code
        - software_version
        - ac_offgrid_power
        - fault_status
        - alarm_status
    binary:
        - discharge_limit_mode
    select:
        - grid_standard
    number:
        - charging_cutoff_capacity
        - discharging_cutoff_capacity

SENSOR_DEFINITIONS:
    plant_status:
        register: 10000
        scale: 1
        unit: null
        icon: "mdi:state-machine"
        enabled_by_default: true
        data_type: uint16
        precision: 0
        states:
        0: Sleep
        1: On-Grid
        2: Off-Grid
        3: Standby
        4: Fault
        scan_interval: high
    activepower_acside:
        register: 10006
        count: 2
        scale: 1
        unit: kWh
        device_class: power
        state_class: measurement
        enabled_by_default: true
        data_type: int32
        precision: 2
        scan_interval: low
        data_type: int32
        unit: null
        enabled_by_default: true
        scan_interval: very_low
        precision: 0
    model_name:
        register: 10090
        count: 10
        scale: 1
        unit: null
        enabled_by_default: true
        data_type: char
        precision: 0
        scan_interval: very_low
    model_name2:
        register: 30000
        count: 10
        scale: 1
        unit: null
        enabled_by_default: true
        data_type: char
        precision: 0
        scan_interval: very_low

EFFICIENCY_SENSOR_DEFINITIONS:
    round_trip_efficiency_total:
        key: round_trip_efficiency_total
        unit: "%"
        category: diagnostic
        state_class: measurement
        mode: round_trip
        dependency_keys:
        charge: total_charging_energy
        discharge: total_discharging_energy
    round_trip_efficiency_monthly:
        key: round_trip_efficiency_monthly
        unit: "%"
        category: diagnostic
        state_class: measurement
        mode: round_trip
        dependency_keys:
        charge: total_monthly_charging_energy
        discharge: total_monthly_discharging_energy
    conversion_efficiency:
        key: conversion_efficiency
        unit: "%"
        category: diagnostic
        state_class: measurement
        mode: conversion
        dependency_keys:
        battery_power: battery_power
        ac_power: ac_power

STORED_ENERGY_SENSOR_DEFINITIONS:
    stored_energy:
        key: stored_energy
        unit: kWh
        device_class: energy
        state_class: total
        dependency_keys:
        soc: battery_soc
        capacity: battery_total_energy